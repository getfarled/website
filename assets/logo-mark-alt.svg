<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Farled">
  <!-- Crossing, no contact: two course lines swap lanes inside a graduated
       chart scope; the break at the crossing is the chart/schematic symbol
       for "these do not touch". -->
  <g stroke="#12303F" fill="none">
    <circle cx="256" cy="256" r="232" stroke-width="16"/>
    <g stroke-width="10">
      <path d="M256 24 v26 M256 462 v26 M24 256 h26 M462 256 h26
               M92 92 l18 18 M402 402 l18 18 M420 92 l-18 18 M110 402 l-18 18"/>
    </g>
    <g stroke-width="42" stroke-linecap="round">
      <path d="M118 350 C 214 350 252 168 394 164"/>
      <path d="M118 162 C 176 162 212 210 238 242"/>
      <path d="M278 286 C 306 320 342 348 394 348"/>
    </g>
  </g>
  <circle cx="404" cy="164" r="34" fill="#0E7C4A"/>
  <circle cx="404" cy="348" r="34" fill="#B8862B"/>
</svg>
