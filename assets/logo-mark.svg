<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Farled">
  <!-- The F is the fairway: vertical = course line, arms = branching lanes.
       The course continues as chart dashes through the gate of IALA lateral
       marks — red square (port), green triangle (starboard) — the symbols
       that mark a real Swedish farled on a nautical chart. -->
  <g fill="none" stroke="#12303F" stroke-width="58" stroke-linecap="round">
    <path d="M164 92 V 336"/>
    <path d="M164 116 C 252 116 288 98 386 98"/>
    <path d="M164 238 C 244 238 272 222 348 222"/>
    <path d="M164 336 V 486" stroke-dasharray="30 42" stroke-width="44"/>
  </g>
  <rect x="42" y="356" width="76" height="76" fill="#C7401F"/>
  <path d="M312 438 h 92 l -46 -80 z" fill="#0E7C4A"/>
</svg>
